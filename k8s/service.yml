apiVersion: v1
kind: Service
metadata:
  name: logginginspring-service
  namespace: default
  labels:
    app: logginginspring
  # annotations:
  #   # AWS NLB example (uncomment on EKS for a real NLB instead of a classic ELB):
  #   service.beta.kubernetes.io/aws-load-balancer-type: nlb
spec:
  type: LoadBalancer
  selector:
    app: logginginspring
  ports:
    - name: http
      port: 80           # external port the LB listens on
      targetPort: 8080   # containerPort exposed by the deployment
      protocol: TCP
  # sessionAffinity: None   # uncomment to disable sticky sessions