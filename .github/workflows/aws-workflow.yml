name: Dev Workflow to AWS EKS

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Setup JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and Maven
        run: mvn clean install

      - name: Upload test results
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: target/surefire-reports/

      - name: Upload JAR
        uses: actions/upload-artifact@v7
        with:
          name: app-jar
          path: target/*.jar

  docker-build-push:
    needs: build-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Download JAR file
        uses: actions/download-artifact@v7
        with:
          name: app-jar
          path: target/

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: abhishekumap/logging-spring:latest



  deploy-eks:
    needs: docker-build-push
    runs-on: ubuntu-latest
    # Don't allow two deploys to race on rapid pushes.
    concurrency:
      group: deploy-eks
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Install kubectl
        uses: azure/setup-kubectl@v5
        with:
          version: v1.30.0

      - name: Update kubeconfig for the EKS cluster
        run: |
          aws eks update-kubeconfig \
            --name k8s-cluster \
            --region ap-south-1

      - name: Sanity check the cluster
        run: |
          kubectl cluster-info
          kubectl get nodes

      - name: Apply k8s manifests
        run: |
          kubectl apply -f k8s/config.yml
          kubectl apply -f k8s/deployment.yml
          kubectl apply -f k8s/service.yml

      - name: Roll the deployment to pull the new :latest image
        # `kubectl set image` forces a rollout even when the tag string didn't
        # change. imagePullPolicy: Always in deployment.yml ensures the fresh
        # image is fetched from Docker Hub.
        run: |
          kubectl set image deployment/logginginspring-deployment \
            logginginspring=abhishekumap/logging-spring:latest
          kubectl rollout status deployment/logginginspring-deployment --timeout=5m
          kubectl get pods -l app=logginginspring

